<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Demo Nhận Diện Âm Thanh AI</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
        #results { font-size: 24px; font-weight: bold; color: #d32f2f; margin-top: 20px; white-space: pre; }
        button { padding: 10px 20px; font-size: 18px; margin: 10px; cursor: pointer; }
        .details { font-size: 16px; font-family: monospace; color: #333; text-align: left; display: inline-block; }
    </style>
</head>
<body>
    <h1 id="status">Đang tải mô hình AI...</h1>

    <button id="btn-start" disabled>🎙️ Bật Mic & Nhận Diện</button>
    <button id="btn-stop" disabled>🛑 Tắt Mic</button>

    <div id="results">Bấm "Bật Mic" để bắt đầu...</div>
    <div class="details" id="details"></div>

    <script src="edge-impulse-standalone.js"></script>
    <script src="run-impulse.js"></script>
    <script>
        let audioCtx, stream, processor, classifier;
        let audioBuffer = [];

        const TARGET_SR = 16000;
        const WINDOW_SIZE = 16000;
        const HOP_SIZE = 4000;
        const CONFIDENCE_THRESHOLD = 0.65;

        // Resample linear interpolation
        function resample(inputSamples, inputRate, outputRate) {
            if (inputRate === outputRate) return inputSamples;
            const ratio = inputRate / outputRate;
            const outputLength = Math.round(inputSamples.length / ratio);
            const output = new Float32Array(outputLength);
            for (let i = 0; i < outputLength; i++) {
                const src = i * ratio;
                const lo = Math.floor(src);
                const hi = Math.min(lo + 1, inputSamples.length - 1);
                const t = src - lo;
                output[i] = inputSamples[lo] * (1 - t) + inputSamples[hi] * t;
            }
            return output;
        }

        (async () => {
            try {
                classifier = new EdgeImpulseClassifier();
                await classifier.init();
                document.getElementById('status').textContent = '✅ Mô hình đã sẵn sàng!';
                document.getElementById('btn-start').disabled = false;
            } catch (err) {
                document.getElementById('status').textContent = '❌ Lỗi tải mô hình!';
                console.error(err);
            }
        })();

        document.getElementById('btn-start').onclick = async () => {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const nativeSR = audioCtx.sampleRate;

                document.getElementById('status').textContent =
                    `✅ Browser SR: ${nativeSR}Hz → Resample 16000Hz`;

                const source = audioCtx.createMediaStreamSource(stream);
                processor = audioCtx.createScriptProcessor(4096, 1, 1);
                source.connect(processor);
                processor.connect(audioCtx.destination);

                document.getElementById('btn-start').disabled = true;
                document.getElementById('btn-stop').disabled = false;
                document.getElementById('results').textContent = 'Đang phân tích...';

                processor.onaudioprocess = (e) => {
                    const inputData = e.inputBuffer.getChannelData(0);
                    const resampled = resample(inputData, nativeSR, TARGET_SR);

                    for (let i = 0; i < resampled.length; i++) {
                        audioBuffer.push(resampled[i]);
                    }

                    while (audioBuffer.length >= WINDOW_SIZE) {
                        // ✅ Quan trọng: nhân 32768 để chuyển float32 → int16 range
                        const features = audioBuffer.slice(0, WINDOW_SIZE).map(x => x * 32768);
                        audioBuffer = audioBuffer.slice(HOP_SIZE);

                        try {
                            const res = classifier.classify(features);

                            let bestLabel = '', bestScore = 0;
                            res.results.forEach(c => {
                                if (c.value > bestScore) {
                                    bestScore = c.value;
                                    bestLabel = c.label;
                                }
                            });

                            if (bestScore >= CONFIDENCE_THRESHOLD) {
                                document.getElementById('results').textContent =
                                    `Dự đoán: ${bestLabel.toUpperCase()} (${(bestScore * 100).toFixed(1)}%)`;
                            } else {
                                document.getElementById('results').textContent =
                                    `🤔 Không chắc: ${bestLabel} (${(bestScore * 100).toFixed(1)}%)`;
                            }

                            document.getElementById('details').textContent =
                                JSON.stringify(res.results, null, 4);

                        } catch (err) {
                            console.error('Lỗi phân loại:', err);
                        }
                    }
                };

            } catch (err) {
                alert('Lỗi truy cập Mic: Bạn chưa cấp quyền Microphone!');
            }
        };

        document.getElementById('btn-stop').onclick = () => {
            if (processor) { processor.disconnect(); processor = null; }
            if (audioCtx)  { audioCtx.close(); audioCtx = null; }
            if (stream)    { stream.getTracks().forEach(t => t.stop()); stream = null; }

            audioBuffer = [];
            document.getElementById('btn-start').disabled = false;
            document.getElementById('btn-stop').disabled = true;
            document.getElementById('results').textContent = 'Đã dừng thu âm.';
            document.getElementById('details').textContent = '';
            document.getElementById('status').textContent = '✅ Mô hình đã sẵn sàng!';
        };
    </script>
</body>
</html>
